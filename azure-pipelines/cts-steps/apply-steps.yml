# azure-pipelines/cts-steps/apply-steps.yml
#
# Per-OS step list reused by cts-apply.yml.
#
# Strategy: download the most recent baseline artifact published by cts-collect.yml
# from main (latestFromBranch) — one per OS, overwritten daily. We do NOT walk
# git ancestry; instead we record the baseline SHA we got and `baselineAgeCommits`
# = git rev-list --count <baselineSha>..<prHeadSha>. If the baseline isn't an
# ancestor of the PR HEAD (e.g. rebased PR or main moved sideways), cts will widen
# selection to compensate — still correct.
#
# Inputs:
#   osTag             : "windows" | "linux"
#   ctsFeed           : NuGet feed URL where the `cts` global tool lives
#   collectPipelineId : pipeline definition id of cts-collect.yml; 0 disables
#                       the apply step entirely (see "Fallback" below).
#   collectProject    : ADO project the collect pipeline lives in (e.g. "DevDiv").
#
# Fallback: if collectPipelineId is 0 or the artifact download fails, the step
# emits cts-metrics.json with fallbackReason and exits *without* running a full
# `dotnet test`. The regular PR pipeline keeps providing test signal; this
# pipeline is non-blocking and there's no value in duplicating its work.

parameters:
- name: osTag
  type: string
- name: ctsFeed
  type: string
- name: collectPipelineId
  type: number
- name: collectProject
  type: string
- name: collectSourceBranch
  type: string
  default: refs/heads/main
- name: ctsToolVersion
  # Optional explicit version of the `cts` global tool to install (e.g.
  # "1.2.3-preview"). Leave empty to float to the latest prerelease. Pin it
  # to the SAME value used by cts-collect.yml so apply and collect always run
  # the same tool build — otherwise a prerelease published between the daily
  # collect and a PR apply can change the baseline serialization format and
  # make `cts apply` silently fall back. Bump the pin intentionally.
  type: string
  default: ''

steps:
- checkout: self
  fetchDepth: 0   # Need history for baselineAgeCommits.
  clean: true

# Drift guard: MSBuild.VSTest.slnx must mirror MSBuild.slnx's production graph
# (see scripts/cts/Check-SlnxParity.ps1). Non-blocking so it never gates a PR —
# a failure surfaces as succeededWithIssues and the "Present/Missing" project
# lists are printed to the step log for triage.
- pwsh: ./scripts/cts/Check-SlnxParity.ps1
  displayName: Check MSBuild.VSTest.slnx parity (non-blocking)
  continueOnError: true

- task: UseDotNet@2
  # cts itself is built against net8.0; see collect-steps.yml.
  displayName: Install .NET 8 runtime (cts apphost)
  inputs:
    packageType: runtime
    version: 8.0.x

- task: UseDotNet@2
  # net10.0 runtime for vstest's testhost.exe; see collect-steps.yml.
  displayName: Install .NET 10 runtime (testhost)
  inputs:
    packageType: runtime
    version: 10.0.x
    includePreviewVersions: true

- task: NuGetAuthenticate@1
  displayName: Authenticate to internal NuGet feeds

- pwsh: |
    $ErrorActionPreference = 'Stop'
    # The repo's NuGet.config uses package source mapping, so `dotnet tool
    # update --add-source <feed>` is rejected with "The --add-source option
    # cannot be combined with package source mapping." Work around this by
    # writing a temp standalone NuGet.config that contains *only* the cts
    # feed (no mapping) and pointing the install at it via --configfile.
    $cfgDir  = Join-Path $env:AGENT_TEMPDIRECTORY 'cts-install'
    New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
    $cfgPath = Join-Path $cfgDir 'NuGet.config'
    $feed = '${{ parameters.ctsFeed }}'
    $lines = @(
      '<?xml version="1.0" encoding="utf-8"?>',
      '<configuration>',
      '  <packageSources>',
      '    <clear />',
      ('    <add key="cts" value="' + $feed + '" />'),
      '  </packageSources>',
      '</configuration>'
    )
    Set-Content -Path $cfgPath -Value $lines -Encoding utf8
    $installArgs = @('tool', 'update', 'cts', '--global', '--prerelease', '--configfile', "$cfgPath")
    $toolVersion = '${{ parameters.ctsToolVersion }}'
    if ($toolVersion) { $installArgs += @('--version', $toolVersion) }
    dotnet @installArgs
    if ($LASTEXITCODE -ne 0) { throw "cts install/update failed" }
    $toolsDir = if ($IsWindows) { Join-Path $env:USERPROFILE '.dotnet\tools' } else { Join-Path $env:HOME '.dotnet/tools' }
    Write-Host "##vso[task.prependpath]$toolsDir"
  displayName: Install cts tool

- pwsh: |
    $headSha = git rev-parse HEAD
    Write-Host "##vso[task.setvariable variable=PrHeadSha]$headSha"
    Write-Host "PR HEAD SHA: $headSha"
  displayName: Resolve PR HEAD SHA

- ${{ if ne(parameters.collectPipelineId, 0) }}:
  - task: DownloadPipelineArtifact@2
    displayName: Download latest cts-baseline-${{ parameters.osTag }}
    continueOnError: true
    inputs:
      buildType: specific
      project: ${{ parameters.collectProject }}
      definition: ${{ parameters.collectPipelineId }}
      buildVersionToDownload: latestFromBranch
      branchName: ${{ parameters.collectSourceBranch }}
      artifactName: cts-baseline-${{ parameters.osTag }}
      targetPath: $(BaselineDir)
      # Required: the collect pipeline frequently ends with overall result
      # = "failed" or "partiallySucceeded" because one OS leg may fail while
      # the other publishes a usable baseline (and even on the green side,
      # `cts collect` itself returns 1 on any test failure, which we
      # tolerate but ADO still records). Without these flags
      # latestFromBranch finds no candidate runs and the task errors with
      # "No builds currently exist in the pipeline definition supplied."
      allowPartiallySucceededBuilds: true
      allowFailedBuilds: true
  - task: DownloadPipelineArtifact@2
    displayName: Download latest cts-collect-metrics-${{ parameters.osTag }}
    continueOnError: true
    inputs:
      buildType: specific
      project: ${{ parameters.collectProject }}
      definition: ${{ parameters.collectPipelineId }}
      buildVersionToDownload: latestFromBranch
      branchName: ${{ parameters.collectSourceBranch }}
      artifactName: cts-collect-metrics-${{ parameters.osTag }}
      targetPath: $(Build.SourcesDirectory)/.cts/baseline-meta
      allowPartiallySucceededBuilds: true
      allowFailedBuilds: true

- pwsh: |
    # Determine whether the baseline download succeeded and, if so, extract the SHA
    # the baseline was taken at from its sibling cts-metrics.json.
    $fallback = $null
    $baselineSha = $null
    $baselineAgeMinutes = $null
    if (${{ parameters.collectPipelineId }} -eq 0) {
      $fallback = 'collect-pipeline-not-configured'
    } elseif (-not (Test-Path "$(BaselineDir)") -or
              -not (Get-ChildItem "$(BaselineDir)" -Recurse -ErrorAction SilentlyContinue)) {
      $fallback = 'baseline-download-failed'
    } else {
      $metaFile = Join-Path "$(Build.SourcesDirectory)/.cts/baseline-meta" 'cts-metrics.json'
      if (Test-Path $metaFile) {
        try {
          $meta = Get-Content $metaFile -Raw | ConvertFrom-Json
          $baselineSha = $meta.sha
          $finish = [DateTimeOffset]::Parse($meta.timestampUtc)
          $baselineAgeMinutes = [int]([DateTimeOffset]::UtcNow - $finish).TotalMinutes
        } catch {
          Write-Host "##vso[task.logissue type=warning]Failed to parse baseline metadata: $_"
        }
      }
      if (-not $baselineSha) { $fallback = 'baseline-metadata-missing' }
    }
    foreach ($pair in @(
      @{ k = 'fallbackReason';     v = $fallback },
      @{ k = 'baselineSha';        v = $baselineSha },
      @{ k = 'baselineAgeMinutes'; v = $baselineAgeMinutes })) {
      $val = if ($null -eq $pair.v) { '' } else { "$($pair.v)" }
      Write-Host "##vso[task.setvariable variable=$($pair.k)]$val"
    }
    Write-Host "Resolved baseline: sha=$baselineSha, ageMin=$baselineAgeMinutes, fallback=$fallback"
  displayName: Resolve baseline metadata

- pwsh: |
    # Use Arcade's build entry point so init-tools / bootstrap runs before
    # the slnx build (MSBuild.Bootstrap needs DotNetInstallScriptRootPath
    # + the bundled SDK props). See collect-steps.yml.
    # UsingToolVisualStudioIbcTraining=false: see collect-steps.yml note.
    if ($IsWindows) {
      & "$(Build.SourcesDirectory)/eng/common/build.ps1" `
        -restore -build `
        -configuration $(BuildConfiguration) `
        -projects "$(Build.SourcesDirectory)/MSBuild.VSTest.slnx" `
        -verbosity minimal `
        /p:UsingToolVisualStudioIbcTraining=false
    } else {
      bash "$(Build.SourcesDirectory)/eng/common/build.sh" `
        --restore --build `
        --configuration $(BuildConfiguration) `
        --projects "$(Build.SourcesDirectory)/MSBuild.VSTest.slnx" `
        --verbosity minimal `
        /p:UsingToolVisualStudioIbcTraining=false
    }
    if ($LASTEXITCODE -ne 0) { throw "Build MSBuild.VSTest.slnx failed" }
  displayName: Build MSBuild.VSTest.slnx

- pwsh: |
    $sw = [Diagnostics.Stopwatch]::StartNew()
    $logsDir = "$(Build.SourcesDirectory)/.cts/logs"
    New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
    $applyLog = Join-Path $logsDir 'cts-apply.console.log'
    $fallback = '$(fallbackReason)'
    $exit = 0
    if ($fallback) {
      Write-Host "##vso[task.logissue type=warning]Skipping cts apply (fallback: $fallback). This run produces metrics only; the regular PR pipeline still provides test signal."
    } else {
      # Stream cts output to both the console (so you can watch it live in the
      # ADO log) and a file (so the next step can parse the summary block).
      cts apply vstest `
        --rootPath                    "$(Build.SourcesDirectory)" `
        --config                      "$(CtsConfigPath)" `
        --storage-type                filesystem `
        --storage-type-filesystem-dir "$(BaselineDir)" `
        --tag                         "$(baselineSha)" `
        --logs-directory              "$logsDir" `
        --coverage `
        --print-console-output 2>&1 | Tee-Object -FilePath $applyLog
      $exit = $LASTEXITCODE
      if ($exit -ne 0) {
        Write-Host "##vso[task.logissue type=warning]cts apply exit $exit (non-blocking)"
        # Record as a fallback reason so it shows up in metrics aggregation,
        # but only if the baseline data wasn't enough to produce meaningful
        # selection. Some test failures don't break the value of the run.
        if (-not (Test-Path $applyLog) -or
            -not (Select-String -Path $applyLog -Pattern '^\s*discovered:' -Quiet)) {
          Write-Host "##vso[task.setvariable variable=fallbackReason]cts-apply-error"
        }
      }
    }
    $sw.Stop()
    Write-Host "##vso[task.setvariable variable=CtsApplyWallTimeMs]$([int]$sw.ElapsedMilliseconds)"
    Write-Host "##vso[task.setvariable variable=CtsApplyExit]$exit"
    Write-Host "##vso[task.setvariable variable=CtsApplyLog]$applyLog"
  displayName: cts apply vstest
  continueOnError: true

- pwsh: |
    # Parse the `=== Summary ===` block emitted by cts apply (same shape as
    # cts collect: lines like "  discovered: N", "  executed: N", "  failed:
    # N", "  succeeded: N", "  skipped: N"). Best-effort: if we can't find
    # the file or any field, leave that field $null in the metrics + the
    # summary box still renders with "n/a".
    function Get-CtsField($log, $name) {
      if (-not (Test-Path $log)) { return $null }
      $line = Select-String -Path $log -Pattern "^\s*${name}:\s*(\S+)" | Select-Object -Last 1
      if (-not $line) { return $null }
      $val = $line.Matches[0].Groups[1].Value
      if ($val -match '^\d+$') { return [int]$val }
      return $val
    }
    function Get-CtsRatio($log, $patterns) {
      if (-not (Test-Path $log)) { return $null }
      foreach ($p in $patterns) {
        $m = Select-String -Path $log -Pattern $p | Select-Object -Last 1
        if ($m) {
          $sel = [int]$m.Matches[0].Groups[1].Value
          $tot = [int]$m.Matches[0].Groups[2].Value
          if ($tot -gt 0) {
            return [pscustomobject]@{ Selected = $sel; Total = $tot; Ratio = [math]::Round($sel / $tot, 4) }
          }
        }
      }
      return $null
    }

    $log = '$(CtsApplyLog)'
    $disc   = Get-CtsField $log 'discovered'
    $exec   = Get-CtsField $log 'executed'
    $passed = Get-CtsField $log 'succeeded'
    $failed = Get-CtsField $log 'failed'
    $skip   = Get-CtsField $log 'skipped'
    # cts apply emits something like "Selected N out of M tests" or
    # "selection: N/M" — try a few patterns. If none match we still print
    # what we know (executed / discovered) which is also a useful proxy.
    $sel    = Get-CtsRatio $log @(
      'Selected\s+(\d+)\s+out\s+of\s+(\d+)\s+tests',
      'selection:\s*(\d+)\s*/\s*(\d+)',
      'impacted:\s*(\d+)\s*/\s*(\d+)'
    )

    # Headline: incrementality % = 1 - executed/discovered if we don't have
    # an explicit selection line. Discovered is the total candidate set; the
    # number cts actually ran is the "selected" set.
    $headlineSelected = if ($sel) { $sel.Selected } else { $exec }
    $headlineTotal    = if ($sel) { $sel.Total }    else { $disc }
    $incrementality   = $null
    if ($headlineTotal -and $headlineTotal -gt 0 -and $null -ne $headlineSelected) {
      $incrementality = [math]::Round(100.0 * (1.0 - ($headlineSelected / $headlineTotal)), 2)
    }

    function F($v) { if ($null -eq $v) { 'n/a' } else { "$v" } }

    $bar = '=' * 78
    Write-Host ''
    Write-Host $bar -ForegroundColor Cyan
    Write-Host '  CTS INCREMENTALITY SUMMARY  (${{ parameters.osTag }})' -ForegroundColor Cyan
    Write-Host $bar -ForegroundColor Cyan
    Write-Host ("  baseline SHA       : {0}" -f (F '$(baselineSha)'))
    Write-Host ("  baseline age (min) : {0}" -f (F '$(baselineAgeMinutes)'))
    Write-Host ("  PR HEAD SHA        : {0}" -f (F '$(PrHeadSha)'))
    Write-Host ("  fallback reason    : {0}" -f (F '$(fallbackReason)'))
    Write-Host ('-' * 78) -ForegroundColor DarkCyan
    Write-Host ("  candidate tests    : {0}" -f (F $headlineTotal))
    Write-Host ("  selected tests     : {0}" -f (F $headlineSelected))
    Write-Host ("  INCREMENTALITY     : {0}%" -f (F $incrementality)) -ForegroundColor Yellow
    Write-Host ('-' * 78) -ForegroundColor DarkCyan
    Write-Host ("  discovered         : {0}" -f (F $disc))
    Write-Host ("  executed           : {0}" -f (F $exec))
    Write-Host ("  succeeded          : {0}" -f (F $passed)) -ForegroundColor Green
    Write-Host ("  failed             : {0}" -f (F $failed)) -ForegroundColor $(if ($failed -gt 0) { 'Red' } else { 'Green' })
    Write-Host ("  skipped            : {0}" -f (F $skip))
    Write-Host ("  cts apply exit     : {0}" -f (F '$(CtsApplyExit)'))
    Write-Host ("  wall time (ms)     : {0}" -f (F '$(CtsApplyWallTimeMs)'))
    Write-Host $bar -ForegroundColor Cyan
    Write-Host '  Compare these counts against the regular PR pipeline (.vsts-dotnet-ci.yml)' -ForegroundColor DarkGray
    Write-Host '  to validate the incrementality reading.' -ForegroundColor DarkGray
    Write-Host $bar -ForegroundColor Cyan
    Write-Host ''

    # Expose the parsed numbers as variables so the metrics step picks them up.
    foreach ($pair in @(
      @{ k = 'CtsDiscovered';       v = $disc },
      @{ k = 'CtsExecuted';         v = $exec },
      @{ k = 'CtsPassed';           v = $passed },
      @{ k = 'CtsFailed';           v = $failed },
      @{ k = 'CtsSkipped';          v = $skip },
      @{ k = 'CtsSelectedTests';    v = $headlineSelected },
      @{ k = 'CtsTotalTests';       v = $headlineTotal },
      @{ k = 'CtsIncrementalityPct';v = $incrementality })) {
      $val = if ($null -eq $pair.v) { '' } else { "$($pair.v)" }
      Write-Host "##vso[task.setvariable variable=$($pair.k)]$val"
    }
  displayName: Summarize CTS apply results
  condition: always()

- pwsh: |
    $version = (& cts --version 2>$null) -join ' '
    function Box($v) { if ($null -eq $v -or $v -eq '') { return $null } else { return $v } }
    function BoxInt($v) { $b = Box $v; if ($null -eq $b) { return $null } else { return [int]$b } }
    function BoxNum($v) { $b = Box $v; if ($null -eq $b) { return $null } else { return [double]$b } }
    $baselineSha       = Box '$(baselineSha)'
    $baselineAgeMin    = Box '$(baselineAgeMinutes)'
    $wallTime          = Box '$(CtsApplyWallTimeMs)'
    $baselineAgeCommits = $null
    if ($baselineSha) {
      try {
        $count = git rev-list --count "$baselineSha..$(PrHeadSha)" 2>$null
        if ($LASTEXITCODE -eq 0) { $baselineAgeCommits = [int]$count }
      } catch { }
    }
    $metrics = [ordered]@{
      schemaVersion            = 1
      phase                    = 'apply'
      os                       = '${{ parameters.osTag }}'
      pipelineRunId            = '$(Build.BuildId)'
      pipelineRunUrl           = "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
      repoBranch               = '$(Build.SourceBranch)'
      wallTimeMs               = if ($wallTime) { [int]$wallTime } else { $null }
      ctsToolVersion           = $version
      timestampUtc             = (Get-Date).ToUniversalTime().ToString('o')
      prHeadSha                = '$(PrHeadSha)'
      baselineSha              = $baselineSha
      baselineAgeCommits       = $baselineAgeCommits
      baselineAgeMinutes       = if ($baselineAgeMin) { [int]$baselineAgeMin } else { $null }
      fallbackReason           = Box '$(fallbackReason)'
      selectedTestCount        = BoxInt '$(CtsSelectedTests)'
      totalCandidateTestCount  = BoxInt '$(CtsTotalTests)'
      incrementalityPercent    = BoxNum '$(CtsIncrementalityPct)'
      executedTestCount        = BoxInt '$(CtsExecuted)'
      passedTestCount          = BoxInt '$(CtsPassed)'
      failedTestCount          = BoxInt '$(CtsFailed)'
      skippedTestCount         = BoxInt '$(CtsSkipped)'
    }
    $out = "$(Build.ArtifactStagingDirectory)/cts-apply-metrics-${{ parameters.osTag }}/cts-metrics.json"
    New-Item -ItemType Directory -Force -Path (Split-Path $out) | Out-Null
    $metrics | ConvertTo-Json -Depth 5 | Set-Content -Path $out -Encoding utf8
    Write-Host "##[group]CTS apply metrics"
    Get-Content $out | Write-Host
    Write-Host "##[endgroup]"
  displayName: Emit cts-metrics.json
  condition: always()

- task: PublishPipelineArtifact@1
  # TODO(1ES): replace with templated `outputs:` once wrapped in 1ES PT.
  displayName: Publish cts-apply-metrics artifact
  condition: always()
  inputs:
    targetPath: $(Build.ArtifactStagingDirectory)/cts-apply-metrics-${{ parameters.osTag }}
    artifact: cts-apply-metrics-${{ parameters.osTag }}
