# azure-pipelines/cts-steps/apply-steps.yml
#
# Per-OS step list reused by cts-apply.yml.
#
# Strategy: download the most recent baseline artifact published by cts-collect.yml
# from main (latestFromBranch) — one per OS, overwritten daily. We do NOT walk
# git ancestry; instead we record the baseline SHA we got and `baselineAgeCommits`
# = git rev-list --count <baselineSha>..<prHeadSha>. If the baseline isn't an
# ancestor of the PR HEAD (e.g. rebased PR or main moved sideways), cts will widen
# selection to compensate — still correct.
#
# Inputs:
#   osTag             : "windows" | "linux"
#   ctsFeed           : NuGet feed URL where the `cts` global tool lives
#   collectPipelineId : pipeline definition id of cts-collect.yml; 0 disables
#                       the apply step entirely (see "Fallback" below).
#   collectProject    : ADO project the collect pipeline lives in (e.g. "DevDiv").
#
# Fallback: if collectPipelineId is 0 or the artifact download fails, the step
# emits cts-metrics.json with fallbackReason and exits *without* running a full
# `dotnet test`. The regular PR pipeline keeps providing test signal; this
# pipeline is non-blocking and there's no value in duplicating its work.

parameters:
- name: osTag
  type: string
- name: ctsFeed
  type: string
- name: collectPipelineId
  type: number
- name: collectProject
  type: string

steps:
- checkout: self
  fetchDepth: 0   # Need history for baselineAgeCommits.
  clean: true

- task: UseDotNet@2
  displayName: Pin .NET SDK from global.json
  inputs:
    packageType: sdk
    useGlobalJson: true

- task: NuGetAuthenticate@1
  displayName: Authenticate to internal NuGet feeds

- pwsh: |
    $ErrorActionPreference = 'Stop'
    dotnet tool update cts --global --prerelease --add-source "${{ parameters.ctsFeed }}"
    if ($LASTEXITCODE -ne 0) { throw "cts install/update failed" }
    $toolsDir = if ($IsWindows) { Join-Path $env:USERPROFILE '.dotnet\tools' } else { Join-Path $env:HOME '.dotnet/tools' }
    Write-Host "##vso[task.prependpath]$toolsDir"
  displayName: Install cts tool

- pwsh: |
    $headSha = git rev-parse HEAD
    Write-Host "##vso[task.setvariable variable=PrHeadSha]$headSha"
    Write-Host "PR HEAD SHA: $headSha"
  displayName: Resolve PR HEAD SHA

- ${{ if ne(parameters.collectPipelineId, 0) }}:
  - task: DownloadPipelineArtifact@2
    displayName: Download latest cts-baseline-${{ parameters.osTag }}
    continueOnError: true
    inputs:
      buildType: specific
      project: ${{ parameters.collectProject }}
      definition: ${{ parameters.collectPipelineId }}
      buildVersionToDownload: latestFromBranch
      branchName: refs/heads/main
      artifactName: cts-baseline-${{ parameters.osTag }}
      targetPath: $(BaselineDir)
  - task: DownloadPipelineArtifact@2
    displayName: Download latest cts-collect-metrics-${{ parameters.osTag }}
    continueOnError: true
    inputs:
      buildType: specific
      project: ${{ parameters.collectProject }}
      definition: ${{ parameters.collectPipelineId }}
      buildVersionToDownload: latestFromBranch
      branchName: refs/heads/main
      artifactName: cts-collect-metrics-${{ parameters.osTag }}
      targetPath: $(Build.SourcesDirectory)/.cts/baseline-meta

- pwsh: |
    # Determine whether the baseline download succeeded and, if so, extract the SHA
    # the baseline was taken at from its sibling cts-metrics.json.
    $fallback = $null
    $baselineSha = $null
    $baselineAgeMinutes = $null
    if (${{ parameters.collectPipelineId }} -eq 0) {
      $fallback = 'collect-pipeline-not-configured'
    } elseif (-not (Test-Path "$(BaselineDir)") -or
              -not (Get-ChildItem "$(BaselineDir)" -Recurse -ErrorAction SilentlyContinue)) {
      $fallback = 'baseline-download-failed'
    } else {
      $metaFile = Join-Path "$(Build.SourcesDirectory)/.cts/baseline-meta" 'cts-metrics.json'
      if (Test-Path $metaFile) {
        try {
          $meta = Get-Content $metaFile -Raw | ConvertFrom-Json
          $baselineSha = $meta.sha
          $finish = [DateTimeOffset]::Parse($meta.timestampUtc)
          $baselineAgeMinutes = [int]([DateTimeOffset]::UtcNow - $finish).TotalMinutes
        } catch {
          Write-Host "##vso[task.logissue type=warning]Failed to parse baseline metadata: $_"
        }
      }
      if (-not $baselineSha) { $fallback = 'baseline-metadata-missing' }
    }
    foreach ($pair in @(
      @{ k = 'fallbackReason';     v = $fallback },
      @{ k = 'baselineSha';        v = $baselineSha },
      @{ k = 'baselineAgeMinutes'; v = $baselineAgeMinutes })) {
      $val = if ($null -eq $pair.v) { '' } else { "$($pair.v)" }
      Write-Host "##vso[task.setvariable variable=$($pair.k)]$val"
    }
    Write-Host "Resolved baseline: sha=$baselineSha, ageMin=$baselineAgeMinutes, fallback=$fallback"
  displayName: Resolve baseline metadata

- pwsh: |
    dotnet build "$(Build.SourcesDirectory)/MSBuild.VSTest.slnx" -c $(BuildConfiguration) --nologo -v:m
  displayName: Build MSBuild.VSTest.slnx

- pwsh: |
    $sw = [Diagnostics.Stopwatch]::StartNew()
    $logsDir = "$(Build.SourcesDirectory)/.cts/logs"
    New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
    $fallback = '$(fallbackReason)'
    $exit = 0
    if ($fallback) {
      Write-Host "##vso[task.logissue type=warning]Skipping cts apply (fallback: $fallback). This run produces metrics only; the regular PR pipeline still provides test signal."
    } else {
      cts apply vstest `
        --rootPath                    "$(Build.SourcesDirectory)" `
        --config                      "$(CtsConfigPath)" `
        --storage-type                filesystem `
        --storage-type-filesystem-dir "$(BaselineDir)" `
        --tag                         "$(baselineSha)" `
        --logs-directory              "$logsDir" `
        --coverage `
        --print-console-output
      $exit = $LASTEXITCODE
      if ($exit -ne 0) {
        Write-Host "##vso[task.logissue type=warning]cts apply exit $exit (non-blocking)"
        # Record as a fallback reason so it shows up in metrics aggregation.
        Write-Host "##vso[task.setvariable variable=fallbackReason]cts-apply-error"
      }
    }
    $sw.Stop()
    Write-Host "##vso[task.setvariable variable=CtsApplyWallTimeMs]$([int]$sw.ElapsedMilliseconds)"
    Write-Host "##vso[task.setvariable variable=CtsApplyExit]$exit"
  displayName: cts apply vstest
  continueOnError: true

- pwsh: |
    $version = (& cts --version 2>$null) -join ' '
    function Box($v) { if ($null -eq $v -or $v -eq '') { return $null } else { return $v } }
    $baselineSha       = Box '$(baselineSha)'
    $baselineAgeMin    = Box '$(baselineAgeMinutes)'
    $wallTime          = Box '$(CtsApplyWallTimeMs)'
    $baselineAgeCommits = $null
    if ($baselineSha) {
      try {
        $count = git rev-list --count "$baselineSha..$(PrHeadSha)" 2>$null
        if ($LASTEXITCODE -eq 0) { $baselineAgeCommits = [int]$count }
      } catch { }
    }
    $metrics = [ordered]@{
      schemaVersion       = 1
      phase               = 'apply'
      os                  = '${{ parameters.osTag }}'
      pipelineRunId       = '$(Build.BuildId)'
      pipelineRunUrl      = "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
      repoBranch          = '$(Build.SourceBranch)'
      wallTimeMs          = if ($wallTime) { [int]$wallTime } else { $null }
      ctsToolVersion      = $version
      timestampUtc        = (Get-Date).ToUniversalTime().ToString('o')
      prHeadSha           = '$(PrHeadSha)'
      baselineSha         = $baselineSha
      baselineAgeCommits  = $baselineAgeCommits
      baselineAgeMinutes  = if ($baselineAgeMin) { [int]$baselineAgeMin } else { $null }
      fallbackReason      = Box '$(fallbackReason)'
    }
    $out = "$(Build.ArtifactStagingDirectory)/cts-apply-metrics-${{ parameters.osTag }}/cts-metrics.json"
    New-Item -ItemType Directory -Force -Path (Split-Path $out) | Out-Null
    $metrics | ConvertTo-Json -Depth 5 | Set-Content -Path $out -Encoding utf8
    Write-Host "##[group]CTS apply metrics"
    Get-Content $out | Write-Host
    Write-Host "##[endgroup]"
  displayName: Emit cts-metrics.json
  condition: always()

- task: PublishPipelineArtifact@1
  # TODO(1ES): replace with templated `outputs:` once wrapped in 1ES PT.
  displayName: Publish cts-apply-metrics artifact
  condition: always()
  inputs:
    targetPath: $(Build.ArtifactStagingDirectory)/cts-apply-metrics-${{ parameters.osTag }}
    artifact: cts-apply-metrics-${{ parameters.osTag }}
