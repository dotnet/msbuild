# azure-pipelines/cts-collect.yml
#
# Daily Clever Test Selection (CTS) baseline collector.
#
# Trigger: scheduled, 06:00 UTC every day, against `main` only. Does not run
# on PR or push. The published artifacts are consumed by cts-apply.yml.
#
# Storage: Azure DevOps pipeline artifacts (`cts --storage-type
# azuredevopsartifact`). Retention is set to 14 days on the pipeline
# definition in the ADO UI (not configurable from yaml — keep this comment
# in sync if the policy changes).
#
# Each successful run publishes one artifact per OS:
#     cts-baseline-<sha>-windows
#     cts-baseline-<sha>-linux
# plus a `cts-collect-metrics-<os>` artifact whose contents follow
# scripts/cts/METRICS.md.

trigger: none
pr: none

schedules:
- cron: '0 6 * * *'
  displayName: Daily CTS baseline (06:00 UTC)
  branches:
    include:
      - main
  always: true

parameters:
- name: ctsFeed
  type: string
  default: https://devdiv.pkgs.visualstudio.com/_packaging/VS/nuget/v3/index.json

variables:
  BuildConfiguration: Debug
  CtsConfigPath: $(Build.SourcesDirectory)/scripts/cts/cts.config.json

jobs:
- job: Collect_Windows
  displayName: Collect (Windows)
  pool:
    name: VSEng-MicroBuildVSStable
    demands:
    - agent.os -equals Windows_NT
  timeoutInMinutes: 180
  variables:
    OsTag: windows
  steps:
  - template: cts-steps/collect-steps.yml
    parameters:
      osTag: windows
      ctsFeed: ${{ parameters.ctsFeed }}

- job: Collect_Linux
  displayName: Collect (Linux)
  pool:
    name: AzurePipelines-EO
    image: 1ESPT-Ubuntu22.04
    os: linux
  timeoutInMinutes: 180
  variables:
    OsTag: linux
  steps:
  - template: cts-steps/collect-steps.yml
    parameters:
      osTag: linux
      ctsFeed: ${{ parameters.ctsFeed }}
