# MSBuild VMR source-build validation pipeline.
#
# Builds the VMR in source-build mode to validate MSBuild changes.
# Supports passing extra MSBuild properties to stage 2 builds (e.g., -mt mode).
#
# Trigger: Manual only (queue from Azure DevOps UI)
# Uses the same pattern as runtime's vmr-build-pr.yml.

trigger: none
pr: none

parameters:
- name: extraPropertiesStage2
  displayName: 'Extra MSBuild properties for stage 2 (e.g., /p:DotNetBuildMT=true)'
  type: string
  # RecursiveDir fix (PR #13318) enables -mt for repos that were excluded due to
  # TaskHost serialization losing RecursiveDir metadata.
  # Remaining exclusions:
  #   razor - WinFX GenerateTemporaryTargetAssembly uses IBuildEngine callbacks (MSB5022)
  #   winforms, wpf - not validated yet (blocked by roslyn/razor in local testing)
  #   source-build-reference-packages - not validated yet
  default: '/p:DotNetBuildMT=true /p:MSBuildMTExcludedReposOverride=razor%3Bwinforms%3Bwpf%3Bsource-build-reference-packages'

variables:
- template: /eng/common/templates/variables/pool-providers.yml@self

- name: skipComponentGovernanceDetection
  value: true

- name: Codeql.Enabled
  value: false

resources:
  repositories:
  - repository: vmr
    type: github
    name: dotnet/dotnet
    endpoint: dotnet

stages:
- template: /eng/pipelines/templates/stages/vmr-build.yml@vmr
  parameters:
    isBuiltFromVmr: false
    scope: lite
    verifications: [ "source-build-stage1", "source-build-stage2" ]
    extraPropertiesStage2: ${{ parameters.extraPropertiesStage2 }}
