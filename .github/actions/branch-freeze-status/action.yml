name: Branch freeze status
description: >-
  Posts the `branch-freeze` commit status on a pull request head commit, reflecting
  whether the pull request's base branch is currently frozen. A branch is considered
  frozen while an open issue labeled `branch-freeze` contains the marker line
  `<!-- branch-freeze:<branch> -->` on a line by itself; the remaining issue body is
  used as the human-readable reason.

inputs:
  sha:
    description: Head commit SHA to attach the status to.
    required: true
  base-ref:
    description: The pull request base branch name (e.g. main, vs17.14).
    required: true
  repository:
    description: The owner/repo to operate on.
    required: false
    default: ${{ github.repository }}
  github-token:
    description: Token with `statuses: write` and `issues: read` permissions.
    required: true

runs:
  using: composite
  steps:
    - name: Post branch-freeze status
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repository }}
        SHA: ${{ inputs.sha }}
        BASE_REF: ${{ inputs.base-ref }}
      run: |
        set -euo pipefail

        context="branch-freeze"
        label="branch-freeze"
        marker="<!-- branch-freeze:${BASE_REF} -->"

        # Find an open tracking issue that marks THIS base branch as frozen. A branch
        # is frozen iff some `branch-freeze`-labeled open issue has the marker on a
        # line by itself (surrounding whitespace/CR tolerated). Matching the marker as
        # a WHOLE LINE - not a substring - prevents an issue body that merely mentions
        # the marker text from accidentally freezing a branch.
        issues="$(gh issue list \
          --repo "$REPO" \
          --label "$label" \
          --state open \
          --limit 200 \
          --json number,body,url)"

        match="$(printf '%s' "$issues" \
          | jq -c --arg m "$marker" \
              'map(select((.body // "") | split("\n") | any(.[]; (gsub("^\\s+|\\s+$";"")) == $m)))
               | first // empty')"

        if [ -n "$match" ]; then
          issue_url="$(printf '%s' "$match" | jq -r '.url')"

          # Reason = issue body with the marker line(s) removed, flattened to one line.
          reason="$(printf '%s' "$match" \
            | jq -r --arg m "$marker" \
                '(.body // "") | split("\n") | map(select((gsub("^\\s+|\\s+$";"")) != $m)) | join("\n")' \
            | tr '\n' ' ' \
            | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')"
          [ -n "$reason" ] || reason="(no reason provided)"

          description="Frozen: ${reason}"
          # GitHub truncates status descriptions at 140 chars; trim with an ellipsis.
          if [ "${#description}" -gt 140 ]; then
            description="${description:0:137}..."
          fi

          echo "Branch '$BASE_REF' is FROZEN -> reporting failure on $SHA"
          gh api -X POST "repos/$REPO/statuses/$SHA" \
            -f state=failure \
            -f context="$context" \
            -f description="$description" \
            -f target_url="$issue_url" >/dev/null
        else
          echo "Branch '$BASE_REF' is open -> reporting success on $SHA"
          gh api -X POST "repos/$REPO/statuses/$SHA" \
            -f state=success \
            -f context="$context" \
            -f description="Branch open" >/dev/null
        fi
