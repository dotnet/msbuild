name: Add PR to Current Sprint

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: read
  projects: write

jobs:
  add-to-current-sprint:
    if: github.repository_owner == 'dotnet'
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: dotnet
      PROJECT_NUMBER: 117
      PR_NODE_ID: ${{ github.event.pull_request.node_id }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Add pull request to the current sprint
        shell: bash
        run: |
          set -euo pipefail

          check_graphql_errors()
          {
            response_file="$1"
            operation="$2"

            if jq -e '.errors and (.errors | length > 0)' "$response_file" > /dev/null; then
              echo "$operation failed:"
              jq -r '.errors[].message' "$response_file"
              exit 1
            fi
          }

          query_project_page()
          {
            query_args=(-F "organization=$PROJECT_OWNER" -F "projectNumber=$PROJECT_NUMBER")
            if [ $# -gt 0 ]; then
              query_args+=(-f "after=$1")
            fi

            gh api graphql "${query_args[@]}" -f query='
              query($organization: String!, $projectNumber: Int!, $after: String) {
                organization(login: $organization) {
                  projectV2(number: $projectNumber) {
                    id
                    fields(first: 100, after: $after) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        __typename
                        ... on ProjectV2IterationField {
                          id
                          name
                          configuration {
                            iterations {
                              id
                              title
                              startDate
                              duration
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }'
          }

          after=
          project_id=
          : > iteration-fields.jsonl

          while true; do
            if [ -n "$after" ]; then
              query_project_page "$after" > project-page.json
            else
              query_project_page > project-page.json
            fi

            check_graphql_errors project-page.json "Project field query"

            if [ -z "$project_id" ]; then
              project_id="$(jq -r '.data.organization.projectV2.id // empty' project-page.json)"
            fi
            jq -c '.data.organization.projectV2.fields.nodes[]? | select(.__typename == "ProjectV2IterationField")' project-page.json >> iteration-fields.jsonl

            if [ "$(jq -r '.data.organization.projectV2.fields.pageInfo.hasNextPage' project-page.json)" != "true" ]; then
              break
            fi

            after="$(jq -r '.data.organization.projectV2.fields.pageInfo.endCursor' project-page.json)"
          done

          if [ -z "$project_id" ]; then
            echo "Could not find project $PROJECT_OWNER/$PROJECT_NUMBER. Check that the workflow token can read the organization project."
            exit 1
          fi

          # Prefer the expected "Sprint" field name, then GitHub's default "Iteration" field name.
          iteration_field="$(jq -s -c '
            map({
              priority: (if .name == "Sprint" then 0 elif .name == "Iteration" then 1 else 2 end),
              field: .
            })
            | sort_by(.priority)
            | .[0].field // empty
          ' iteration-fields.jsonl)"
          if [ -z "$iteration_field" ]; then
            echo "Could not find an iteration field on project $PROJECT_OWNER/$PROJECT_NUMBER."
            exit 1
          fi

          iteration_field_id="$(jq -r '.id' <<< "$iteration_field")"
          today="$(date -u +%Y-%m-%d)"
          seconds_per_day=86400
          # GitHub Projects iteration duration is measured in days; the end date is exclusive.
          current_iteration_id="$(jq -r --arg today "$today" --argjson secondsPerDay "$seconds_per_day" '
            [
              .configuration.iterations[]
              | select(
                  ((.startDate + "T00:00:00Z") | fromdateiso8601) as $startDate
                  | ($startDate + (.duration * $secondsPerDay) | todateiso8601 | split("T")[0]) as $endDate
                  | (.startDate <= $today) and ($today < $endDate))
                )
            ]
            # If project iterations overlap, choose the newest active iteration.
            | sort_by(.startDate)
            | reverse
            | .[0].id // empty
          ' <<< "$iteration_field")"
          if [ -z "$current_iteration_id" ]; then
            echo "Could not find a current sprint for $today on project $PROJECT_OWNER/$PROJECT_NUMBER."
            exit 1
          fi

          gh api graphql \
            -f projectId="$project_id" \
            -f contentId="$PR_NODE_ID" \
            -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }' > add-item.json
          check_graphql_errors add-item.json "Adding pull request to project"

          item_id="$(jq -r '.data.addProjectV2ItemById.item.id // empty' add-item.json)"
          if [ -z "$item_id" ]; then
            echo "Adding pull request to project did not return a project item ID."
            exit 1
          fi

          gh api graphql \
            -f projectId="$project_id" \
            -f itemId="$item_id" \
            -f fieldId="$iteration_field_id" \
            -f iterationId="$current_iteration_id" \
            -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { iterationId: $iterationId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }' > update-item.json
          check_graphql_errors update-item.json "Setting current sprint"

          if [ -z "$(jq -r '.data.updateProjectV2ItemFieldValue.projectV2Item.id // empty' update-item.json)" ]; then
            echo "Setting current sprint did not return an updated project item ID."
            exit 1
          fi
