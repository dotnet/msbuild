name: Branch freeze status

# Posts the required `branch-freeze` commit status on pull requests, reflecting
# whether the PR's base branch is currently frozen (see
# .github/actions/branch-freeze-status). Three entry points:
#
#   * pull_request_target  - stamp the single PR that triggered the event. Works
#                            for fork PRs because the base-repo GITHUB_TOKEN has
#                            write access under pull_request_target.
#   * workflow_dispatch    - manually bulk re-stamp open PRs (used once at rollout
#                            to seed every open PR with a green status).
#   * workflow_call        - bulk re-stamp invoked by the /freeze /unfreeze command
#                            workflow after it toggles freeze state.
#
# Security: this workflow runs in the trusted base-repo context. It deliberately
# never checks out or executes pull-request HEAD content - only the trusted base
# checkout (which carries the composite action and shared script) is used, and
# PR-controlled values (sha, base ref) are passed to the script as data args.

on:
  pull_request_target:
    # `edited` is included so that retargeting a PR onto a different (possibly
    # frozen) base branch re-evaluates the status on the same head commit;
    # otherwise a stale green status could allow a merge into a frozen branch.
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Limit stamping to this base branch (blank = all open PRs)."
        required: false
        default: ""
  workflow_call:
    inputs:
      base_ref:
        description: "Limit stamping to this base branch (blank = all open PRs)."
        required: false
        type: string
        default: ""

permissions:
  contents: read       # checkout the local composite action / shared script
  statuses: write      # post the branch-freeze commit status
  issues: read         # read the branch-freeze tracking issues
  pull-requests: read  # enumerate open PRs for bulk stamping

concurrency:
  group: branch-freeze-status-${{ github.event_name }}-${{ github.event.pull_request.number || inputs.base_ref || 'all' }}
  cancel-in-progress: false

jobs:
  single:
    name: Stamp pull request
    # Always run for opened/synchronize/reopened. For `edited`, only re-stamp when
    # the base branch actually changed (ignore title/body edits).
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action != 'edited' || github.event.changes.base != null)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/branch-freeze-status
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  bulk:
    name: Bulk stamp open pull requests
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Stamp open pull requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ inputs.base_ref }}
        shell: bash
        run: |
          set -euo pipefail

          args=(--repo "$REPO" --state open --limit 1000 --json "number,headRefOid,baseRefName")
          if [ -n "${BASE_REF}" ]; then
            args+=(--base "$BASE_REF")
          fi

          prs="$(gh pr list "${args[@]}")"
          count="$(printf '%s' "$prs" | jq 'length')"
          echo "Stamping ${count} open PR(s)${BASE_REF:+ targeting ${BASE_REF}}"
          if [ "$count" -ge 1000 ]; then
            echo "::warning::Open PR count hit the query limit (${count}); some PRs may not have been stamped. Re-run after raising --limit."
          fi

          script="${GITHUB_WORKSPACE}/.github/actions/branch-freeze-status/post-freeze-status.sh"
          fail=0
          while IFS= read -r pr; do
            num="$(printf '%s' "$pr" | jq -r '.number')"
            sha="$(printf '%s' "$pr" | jq -r '.headRefOid')"
            base="$(printf '%s' "$pr" | jq -r '.baseRefName')"
            echo "::group::PR #${num} (${base} @ ${sha})"
            if ! bash "$script" "$sha" "$base"; then
              echo "::warning::Failed to stamp PR #${num}"
              fail=1
            fi
            echo "::endgroup::"
          done < <(printf '%s' "$prs" | jq -c '.[]')

          exit "$fail"
